name: Build & Deploy Jekyll site to GitHub Pages

# Shell repository for en.zhgchg.li.
# Content lives in ZhgChgLi/zhgchgli.github.io; this repo just clones it and
# builds the `en` language overlay (_config.en.yml + L10n/posts/en/).
# Triggered manually, on push to main, or via the `master-updated`
# repository_dispatch fired by the source repo after it deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [master-updated]

env:
  DEPLOY_LANG: en
  SOURCE_REPO: ZhgChgLi/zhgchgli.github.io

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-en"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone source content repo
        run: git clone --depth 1 "https://github.com/${SOURCE_REPO}.git" .

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: actions/configure-pages@v5
        id: pages

      - name: Build with bin/lang
        env:
          JEKYLL_ENV: production
          MEDIUM_HOST: "${{ secrets.MEDIUM_HOST }}"
          MEDIUM_COOKIE_SID: "${{ secrets.MEDIUM_COOKIE_SID }}"
          MEDIUM_COOKIE_UID: "${{ secrets.MEDIUM_COOKIE_UID }}"
          Analytics_URL: "${{ secrets.Analytics_URL }}"
        run: |
          ./bin/lang "${DEPLOY_LANG}" build \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
